<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src *;">
    <title>Weekly Pub Quiz - Coasters Tavern</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;600&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --rose-red: var(--cfg-primary, #FFD700);
            --soft-pink: var(--cfg-soft-pink, #1A1A2E);
            --cream: var(--cfg-cream, #0F0F1A);
            --text-dark: var(--cfg-text-dark, #FFFFFF);
            --glow: var(--cfg-glow, rgba(255, 215, 0, 0.6));
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            background-color: var(--cream);
            color: var(--text-dark);
        }

        #display-container {
            width: 1920px;
            height: 1080px;
            position: relative;
            transform-origin: center center;
            overflow: hidden;
            background-color: var(--cream);
        }

        /* Ambient Background Decoration */
        .quiz-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('quiz.png');
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            z-index: 0;
        }

        /* Superior Glowing Effect overlay */
        .quiz-bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('quiz.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
            mix-blend-mode: color-dodge;
            filter: blur(10px) brightness(1.2);
            animation: pulse-glow 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.2; filter: blur(8px) brightness(1.1); }
            100% { opacity: 0.7; filter: blur(12px) brightness(1.6); }
        }

        /* Ambient Confetti Container */
        #confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }
        .ambient-confetti {
            position: absolute;
            pointer-events: none;
        }

        /* Slideshow Container */
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
        }

        /* Pan Down Effect */
        .slide.pan-down {
            background-size: 100% auto !important;
            background-position: top center !important;
            animation: panDownKING 45s linear forwards;
        }

        @keyframes panDownKING {
            0% { background-position: top center; }
            80% { background-position: bottom center; }
            100% { background-position: bottom center; }
        }

        .slide.active {
            opacity: 1;
        }

        .content {
            background: rgba(0, 0, 0, 0.8);
            padding: 4rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--rose-red);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 85%;
            width: fit-content;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .slide-overlay-img {
            max-width: 70%;
            max-height: 50vh;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
            border: 5px solid white;
        }

        /* Progress Bar */
        #progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(168, 28, 46, 0.05);
            z-index: 100;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #ff4d94;
            box-shadow: 0 0 15px rgba(255, 77, 148, 0.6);
            transition: width 0.1s linear;
        }

        /* Countdown Slide Styles */
        .countdown-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        .countdown-timer {
            font-size: clamp(2.5rem, 6vmin, 5rem);
            font-weight: 700;
            color: var(--rose-red);
            background: rgba(255, 255, 255, 0.4);
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .blink-colon {
            animation: blinker 1s linear infinite;
            margin: 0 5px;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
        .countdown-label {
            font-size: clamp(1rem, 2vmin, 2rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
            font-weight: 700;
            color: var(--rose-red);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -2px;
            font-size: clamp(3rem, 6.5vw, 8rem);
            margin: 0;
            color: var(--rose-red);
            line-height: 1.0;
            text-shadow: 0 5px 25px rgba(168, 28, 46, 0.2);
            white-space: nowrap;
        }

        h2 {
            font-size: clamp(1.769rem, 3.538vw, 3.538rem);
            font-weight: 700;
            margin: 1.5rem 0;
            color: var(--text-dark);
            max-width: 90%;
            text-wrap: balance;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .subtext {
            font-size: 1.47rem;
            line-height: 1.6;
            margin: 1.5rem 0;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Avatar styling */
        .avatar-container {
            margin-top: 1rem;
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            max-height: 35vh;
        }
        .animated-avatar {
            width: clamp(180px, 30vh, 280px);
            height: clamp(180px, 30vh, 280px);
            object-fit: contain;
            border-radius: 50%;
            border: 5px solid var(--rose-red);
            box-shadow: 0 0 40px var(--cfg-glow), 0 0 80px rgba(0,0,0,0.1);
            animation: floatKING 4s ease-in-out infinite;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(10px);
        }
        @keyframes floatKING {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .speech-bubble {
            position: absolute;
            top: -60px;
            right: -100px;
            background: white;
            color: var(--rose-red);
            padding: 1rem 1.5rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.5rem;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: float-bubbleKING 4s ease-in-out infinite;
            z-index: 10;
            border: 2px solid var(--rose-red);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        @keyframes float-bubbleKING {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Winners Carousel */
        .winners-carousel {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .winners-carousel img {
            animation: winner-fadeKING 10s infinite;
            opacity: 0;
            position: absolute;
            height: 380px;
            width: auto;
            object-fit: contain;
            border-radius: 2rem;
            border: 8px solid var(--rose-red);
            box-shadow: 0 0 50px var(--cfg-glow);
        }
        @keyframes winner-fadeKING {
            0%, 10% { opacity: 0; transform: scale(0.9); }
            15%, 85% { opacity: 1; transform: scale(1); }
            90%, 100% { opacity: 0; transform: scale(1.1); }
        }

        .highlight {
            font-size: 1.71rem;
            font-weight: 600;
            color: var(--rose-red);
            margin-top: 2rem;
        }

        /* Logo Placeholder */
        .logo-seal {
            position: absolute;
            bottom: 3rem;
            right: 3rem;
            width: 120px;
            height: 120px;
            border: 2px solid var(--text-dark);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
            background: rgba(255,255,255,0.8);
            z-index: 20;
        }
        /* QR Code Styling */
        .qr-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .qr-frame {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--rose-red);
            transition: transform 0.3s ease;
        }

        .qr-frame:hover {
            transform: scale(1.05);
        }

        .qr-frame img {
            display: block;
            width: 250px;
            height: 250px;
            image-rendering: high-quality;
        }


        /* --- Menu Sidebar Layout --- */
        .menu-sidebar {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 500px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 40px;
            border: 1px solid var(--rose-red);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
            z-index: 20;
        }

        .menu-sidebar h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.06rem;
            color: var(--rose-red);
            line-height: 1.1;
        }

        .menu-sidebar h2 {
            font-size: 1.59rem;
            color: var(--text-dark);
            text-transform: none;
            margin: 0;
        }

        .menu-sidebar .qr-frame img {
            width: 150px;
            height: 150px;
        }

        /* Progress Bar */
        #progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: rgba(0,0,0,0.3); z-index: 1000; }
        #progress-bar { width: 0%; height: 100%; background: var(--rose-red); box-shadow: 0 0 20px var(--rose-red); transition: width 0.05s linear; }

        /* Confetti Layer */
        #confetti-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 50; pointer-events: none; overflow: hidden; 
        }
        .ambient-confetti { position: absolute; z-index: 50; pointer-events: none; }
        
        /* Pink Tint Filter for Logos */
        .pink-tint-white {
            filter: drop-shadow(0 0 2px var(--rose-red)) brightness(0.8) sepia(1) hue-rotate(300deg) saturate(5);
        }
    </style>

</head>
<body>

    <div id="display-container">
        <div class="quiz-bg"></div>
        <div class="quiz-bg-glow"></div>

        <div class="slideshow-container" id="slides-wrapper">
            <!-- Slides are injected here by init() -->
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="confetti-container"></div>
    </div>

    <!-- Navigation Hub -->
    <nav id="nav-hub" style="position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); border-top:1px solid rgba(255,215,0,0.2); padding:12px 20px; display:flex; justify-content:center; align-items:center; gap:20px; z-index:50000; transform:translateY(100%); transition:0.3s;" onmouseenter="this.style.transform='translateY(0)'" onmouseleave="this.style.transform='translateY(100%)'">
        <a href="../_ct-MATRIX/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">📺 Display</a>
        <a href="../_ct-MATRIX/masteradmin.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🛠 Admin</a>
        <span style="color:#333">|</span>
        <a href="index.html" style="color:var(--rose-red); text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">❓ QUIZ</a>
        <a href="../_ct-KING/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">👑 KING</a>
        <a href="../_ct-MMR/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🥩 MMR</a>
        <a href="../_ct-ACE/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🃏 ACE</a>
        <a href="../_ct-WEA/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🌦 WEA</a>
        <a href="../_ct-FIR/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🔥 FIR</a>
        <a href="../_ct-NIM/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🎨 NIM</a>
    </nav>

    <script>
        // --- Security Helpers ---
        function sanitize(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
        }
        function safeUrl(url) {
            if (!url) return '';
            return String(url).trim();
        }

        // --- State ---
        let state = {
            slides: [],
            currentSlideIdx: 0,
            isPaused: false,
            disabledSlides: [],
            overrides: {}
        };

        // --- DOM Elements ---
        const slidesWrapper = document.getElementById('slides-wrapper');
        const progressBar = document.getElementById('progress-bar');

        // --- Broadcast Channel setup ---
        const bc = new BroadcastChannel('king_sync');
        bc.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'STATE_UPDATE') {
                updateState(data.payload);
            }
            if (data.type === 'SLIDE_CMD') {
                handleSlideCmd(data.payload.cmd);
            }
            if (data.type === 'CONFETTI') {
                createConfettiBurst();
            }
        };

        function handleSlideCmd(cmd) {
            if (cmd === 'next') nextSlide();
            if (cmd === 'prev') prevSlide();
            if (cmd === 'toggle') toggleSlidePlay();
        }

        function updateState(newState) {
            state = { ...state, ...newState };
            if (newState.slides || newState.disabledSlides || newState.overrides) {
                renderSlides();
            }
            localStorage.setItem('king_state', JSON.stringify(state));
        }

        function toggleSlidePlay() {
            state.isPaused = !state.isPaused;
            if (state.isPaused) {
                clearInterval(slideInterval);
                clearInterval(progressInterval);
            } else {
                startSlideTimer(30000); // Default resume
            }
        }

        // --- Slideshow Logic ---
        let slideInterval;
        let progressInterval;

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            slides[state.currentSlideIdx].classList.remove('active');
            state.currentSlideIdx = (state.currentSlideIdx + 1) % slides.length;
            
            // Re-check for updates at start of cycle
            if (state.currentSlideIdx === 0) {
                console.log('[QUIZ] Cycle complete.');
            }

            slides[state.currentSlideIdx].classList.add('active');
            
            const dur = parseInt(slides[state.currentSlideIdx].getAttribute('data-duration')) || 30000;
            startSlideTimer(dur);
            createConfettiBurst();
        }

        function prevSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            slides[state.currentSlideIdx].classList.remove('active');
            state.currentSlideIdx = (state.currentSlideIdx + slides.length - 1) % slides.length;
            slides[state.currentSlideIdx].classList.add('active');
            
            const dur = parseInt(slides[state.currentSlideIdx].getAttribute('data-duration')) || 8000;
            startSlideTimer(dur);
        }

        function startSlideTimer(duration) {
            clearInterval(slideInterval);
            clearInterval(progressInterval);
            
            let start = Date.now();
            progressBar.style.width = '0%';
            
            progressInterval = setInterval(() => {
                let elapsed = Date.now() - start;
                let percent = (elapsed / duration) * 100;
                progressBar.style.width = Math.min(percent, 100) + '%';
            }, 50);

            if (state.isPaused) return;

            slideInterval = setInterval(() => {
                if (state.isPaused) return;
                nextSlide();
            }, duration);
        }

        function renderSlides() {
            const visibleSlides = state.slides.filter(s => !(state.disabledSlides || []).includes(s.title));
            if (visibleSlides.length === 0) {
                slidesWrapper.innerHTML = '';
                return;
            }

            // Fix bounds before rendering so the active class is properly applied
            if (state.currentSlideIdx >= visibleSlides.length || state.currentSlideIdx < 0) {
                state.currentSlideIdx = 0;
            }

            const overrides = state.overrides || {};

            slidesWrapper.innerHTML = visibleSlides.map((slide, i) => {
                const ov = overrides[slide.title] || {};
                const title = ov.title || slide.title || '';
                const subtitle = ov.subtitle || slide.subtitle || '';
                const duration = ov.duration || slide.duration || 30000;

                const bgImg = safeUrl(slide.backgroundImage);
                const overlayImg = safeUrl(slide.overlayImage);
                const bgStyle = bgImg ? `background-image: url('${bgImg}');` : '';
                
                // Auto-detect if we should pan (if it's a menu image or type is MENU)
                const shouldPan = bgImg && (bgImg.toLowerCase().includes('menu') || slide.type === 'menu');
                const panClass = shouldPan ? 'pan-down' : '';

                if (shouldPan) {
                    return `
                        <div class="slide ${i === state.currentSlideIdx ? 'active' : ''} ${panClass}" style="${bgStyle}" data-duration="${duration}">
                            <div class="menu-sidebar">
                                <div style="color: var(--rose-red); font-weight: 800; letter-spacing: 3px; font-size: 1.2rem;">WEEKLY QUIZ</div>
                                <h1>${sanitize(title).replace(/\n/g, '<br>')}</h1>
                                <div style="width: 60px; height: 4px; background: var(--rose-red); border-radius: 2px;"></div>
                                ${subtitle ? `<h2>${sanitize(subtitle).replace(/\n/g, '<br>')}</h2>` : ''}
                                
                                <div class="qr-container" style="align-items: flex-start; margin-top: 1rem;">
                                    <div class="qr-frame">
                                        <img src="https://quickchart.io/qr?size=800&margin=1&ecLevel=H&text=${encodeURIComponent(slide.qrUrl || 'https://bookings.nowbookit.com/?accountid=d7034cd3-cfde-4556-a98c-ea943ec35ef4&venueid=13703&theme=light&colors=hex,000000&date=yyyy-mm-dd&serviceids=event')}" alt="QR Code">
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                return `
                    <div class="slide ${i === state.currentSlideIdx ? 'active' : ''} ${panClass}" style="${bgStyle}" data-duration="${duration}">
                        ${bgImg ? '<div class="slide-image-overlay"></div>' : ''}
                        <div class="content">
                            ${overlayImg ? `<img src="${overlayImg}" class="slide-overlay-img">` : ''}
                            ${title ? `<h1>${sanitize(title).replace(/\n/g, '<br>')}</h1>` : ''}
                            ${subtitle && slide.type !== 'avatar' ? `<h2>${sanitize(subtitle).replace(/\n/g, '<br>')}</h2>` : ''}
                            
                            ${slide.type === 'countdown' ? `
                                <div class="countdown-container">
                                    <div class="countdown-timer slide-countdown-timer">00 DAYS LEFT UNTIL...</div>
                                </div>
                            ` : ''}

                            ${slide.type === 'avatar' ? `
                                <div class="avatar-container">
                                    ${(slide.bubbleText || '').trim() ? `<div class="speech-bubble">${sanitize(slide.bubbleText).replace(/\n/g, '<br>')}</div>` : ''}
                                    <img src="${overlayImg || 'coasters-logo.png'}" class="animated-avatar pink-tint-white">
                                </div>
                            ` : ''}

                            ${slide.type === 'winners' ? `
                                <div class="winners-carousel">
                                    ${(slide.winnerPhotos || '').split(',').map(url => url.trim()).filter(url => url).map((url, idx) => `
                                        <img src="${safeUrl(url)}" style="animation-delay: ${idx * 2}s;">
                                    `).join('')}
                                </div>
                            ` : ''}

                            ${slide.type === 'qr' ? `
                                <div class="qr-container">
                                    <div class="qr-frame">
                                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&ecc=L&data=${encodeURIComponent(slide.qrUrl || 'https://bookings.nowbookit.com/?accountid=d7034cd3-cfde-4556-a98c-ea943ec35ef4&venueid=13703&theme=light&colors=hex,000000&date=' + getNextWednesday() + '&serviceids=event')}" alt="QR Code">
                                    </div>
                                    <div class="countdown-timer slide-countdown-timer">${calculateTimeRemainingHTML()}</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            const currentOv = overrides[visibleSlides[state.currentSlideIdx]?.title] || {};
            const currentDur = currentOv.duration || visibleSlides[state.currentSlideIdx]?.duration || 30000;
            startSlideTimer(currentDur);
        }

        // --- Date Calculation ---
        function getNZDate() {
            const tz = 'Pacific/Auckland';
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: tz,
                year: 'numeric', month: 'numeric', day: 'numeric',
                hour: 'numeric', minute: 'numeric', second: 'numeric',
                hourCycle: 'h23'
            }).formatToParts(new Date());
            const v = {};
            parts.forEach(p => v[p.type] = p.value);
            return new Date(v.year, v.month - 1, v.day, v.hour, v.minute, v.second);
        }

        function getNextWednesday7PM() {
            const nzDate = getNZDate();
            let daysUntilNextWed = (3 + 7 - nzDate.getDay()) % 7;
            if (daysUntilNextWed === 0 && nzDate.getHours() >= 19) {
                daysUntilNextWed = 7;
            }
            nzDate.setDate(nzDate.getDate() + daysUntilNextWed);
            const yr = nzDate.getFullYear();
            const mo = String(nzDate.getMonth() + 1).padStart(2, '0');
            const da = String(nzDate.getDate()).padStart(2, '0');
            return `${yr}-${mo}-${da}T19:00`;
        }

        function calculateTimeRemainingHTML() {
            const target = new Date(getNextWednesday7PM());
            const nzNow = getNZDate();
            const diff = target.getTime() - nzNow.getTime();
            
            if (diff <= 0 && diff > -10800000) return '<span>QUIZ IN PROGRESS</span>';
            if (diff <= -10800000) return '<span>NEXT WEEK ENROLLING</span>';
            
            const hrs = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);
            const c = '<span class="blink-colon">:</span>';
            
            return `TIME UNTIL START ${hrs}${c}${String(m).padStart(2,'0')}${c}${String(s).padStart(2,'0')}`;
        }

        function getNextWednesday() {
            const d = getNZDate();
            let day = d.getDay();
            let daysUntilNextWed = (3 + 7 - day) % 7;
            if (daysUntilNextWed === 0 && d.getHours() >= 19) daysUntilNextWed = 7;
            d.setDate(d.getDate() + daysUntilNextWed);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // --- Static Content ---
        function loadStaticSlide() {
            const nextWed = getNextWednesday();
            updateState({ slides: [{ 
                title: "Weekly Pub Quiz", 
                subtitle: "Every Wednesday at 7:00 PM. Scan to book your team for next week!",
                qrUrl: `https://bookings.nowbookit.com/?accountid=d7034cd3-cfde-4556-a98c-ea943ec35ef4&venueid=13703&theme=light&colors=hex,000000&date=${nextWed}&serviceids=event`,
                backgroundImage: "quiz.png",
                type: "qr"
            }] });
        }

        function parseSlidesCSV(text) {
            const result = [];
            let row = [];
            let col = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { col += '"'; i++; }
                    else if (char === '"') { inQuotes = false; }
                    else { col += char; }
                } else {
                    if (char === '"') { inQuotes = true; }
                    else if (char === ',') { row.push(col.trim()); col = ''; }
                    else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                        if (char === '\r') i++;
                        row.push(col.trim());
                        result.push(row);
                        row = []; col = '';
                    } else { col += char; }
                }
            }
            if (col || row.length > 0) { row.push(col.trim()); result.push(row); }

            return result.slice(1).map(clean => {
                const type = (clean[2] || 'normal').toLowerCase();
                if (!clean[0] && type !== 'avatar') return null;

                return {
                    title: clean[0] || '',
                    subtitle: clean[1] || '',
                    type: type,
                    duration: parseInt(clean[3]) || 30000,
                    backgroundImage: clean[4] || '',
                    overlayImage: clean[5] || '',
                    qrUrl: clean[6] || '',
                    bubbleText: clean[7] || '',
                    winnerPhotos: clean[8] || ''
                };
            }).filter(s => s !== null);
        }

        async function fetchAndApplySlides() {
            const url = (window.QUIZ_CONFIG && window.QUIZ_CONFIG.GSHEETS_URL) || '';
            if (!url) return;
            console.log('[QUIZ] Fetching slides from:', url);
            try {
                const res = await fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now(), { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const csv = await res.text();
                let slides = parseSlidesCSV(csv);
                if (slides.length > 0) {
                    console.log('[QUIZ] Slides synced OK — ' + slides.length + ' slides loaded.');
                    updateState({ slides: slides });
                }
            } catch (e) {
                console.error('[QUIZ] Slides sync failed:', e);
            }
        }

        setInterval(() => {
            const timeHtml = calculateTimeRemainingHTML();
            const timers = document.querySelectorAll('.slide-countdown-timer');
            timers.forEach(t => t.innerHTML = timeHtml);
        }, 1000);

        // --- Confetti Logic ---
        const confettiContainer = document.getElementById('confetti-container');
        const crowns = ['❓', '🤔', '💡', '🎓', 'LOGO'];

        function spawnAmbientConfetti() {
            const symbol = crowns[Math.floor(Math.random() * crowns.length)];
            const el = document.createElement('div');
            el.className = 'ambient-confetti';
            el.style.top = '-80px';
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = Math.random() * 1.2 + 1.8 + 'rem'; // 1.8 to 3.0rem
            el.style.filter = 'drop-shadow(0 4px 10px rgba(0,0,0,0.2))';
            el.style.opacity = Math.random() * 0.5 + 0.4; // More visible flow

            if (symbol === 'LOGO') {
                const img = document.createElement('img');
                img.src = 'coasters-logo.png';
                img.style.width = '2.5rem';
                img.style.height = 'auto';
                img.style.opacity = '0.7';
                el.appendChild(img);
            } else {
                el.innerText = symbol;
            }

            const duration = Math.random() * 5 + 7; // Unified duration range
            el.style.transition = `transform ${duration}s linear`;
            confettiContainer.appendChild(el);

            setTimeout(() => {
                el.style.transform = `translateY(120vh) rotate(${Math.random() * 720}deg)`;
            }, 50);

            setTimeout(() => el.remove(), duration * 1000 + 100);
        }

        function createConfettiBurst() {
            for (let i = 0; i < 40; i++) {
                const symbol = crowns[Math.floor(Math.random() * crowns.length)];
                const el = document.createElement('div');
                el.style.position = 'absolute';
                el.style.top = '-80px';
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = '2.5rem';
                el.style.filter = 'drop-shadow(0 5px 15px rgba(0,0,0,0.3))';
                el.style.zIndex = Math.random() > 0.5 ? 60 : 40;

                if (symbol === 'LOGO') {
                    const img = document.createElement('img');
                    img.src = 'coasters-logo.png';
                    img.style.width = '3.5rem';
                    img.style.height = 'auto';
                    el.appendChild(img);
                } else {
                    el.innerText = symbol;
                }

                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                el.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-in`;
                confettiContainer.appendChild(el);

                setTimeout(() => {
                    el.style.transform = `translateY(120vh) rotate(${Math.random() * 360}deg)`;
                    el.style.opacity = '0';
                }, delay * 1000 + 50);

                setTimeout(() => el.remove(), (duration + delay) * 1000 + 100);
            }
        }

        // Start ambient confetti loop
        setInterval(spawnAmbientConfetti, 500);

        // --- Init ---
        async function init() {
            const cfg = window.QUIZ_CONFIG;
            if (cfg) {
                const root = document.documentElement;
                if (cfg.COLORS.primary) root.style.setProperty('--cfg-primary', cfg.COLORS.primary);
                if (cfg.COLORS.softPink) root.style.setProperty('--cfg-soft-pink', cfg.COLORS.softPink);
                if (cfg.COLORS.cream) root.style.setProperty('--cfg-cream', cfg.COLORS.cream);
                if (cfg.COLORS.textDark) root.style.setProperty('--cfg-text-dark', cfg.COLORS.textDark);
                if (cfg.COLORS.glow) root.style.setProperty('--cfg-glow', cfg.COLORS.glow);
            }

            function resize() {
                const container = document.getElementById('display-container');
                const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
                container.style.transform = `scale(${scale})`;
            }
            window.addEventListener('resize', resize);
            resize();

            loadStaticSlide();
            await fetchAndApplySlides();
            setInterval(fetchAndApplySlides, (window.QUIZ_CONFIG && window.QUIZ_CONFIG.SYNC_INTERVAL_MS) || 300000);
        }

        init();
    </script>
</body>
</html>
