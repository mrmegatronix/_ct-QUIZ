<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src *;">
    <title>Weekly Pub Quiz - Coasters Tavern</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;600&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --rose-red: var(--cfg-primary, #FFD700);
            --soft-pink: var(--cfg-soft-pink, #1A1A2E);
            --cream: var(--cfg-cream, #0F0F1A);
            --text-dark: var(--cfg-text-dark, #FFFFFF);
            --glow: var(--cfg-glow, rgba(255, 215, 0, 0.6));
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--cream);
            color: var(--text-dark);
            font-family: 'Outfit', sans-serif;
        }

        #display-container {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            overflow: hidden;
            background-color: var(--cream);
        }

        /* Ambient Background Decoration */
        .quiz-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('quiz.png');
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            z-index: 0;
        }

        /* Superior Glowing Effect overlay */
        .quiz-bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('quiz.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
            mix-blend-mode: color-dodge;
            filter: blur(10px) brightness(1.2);
            animation: pulse-glow 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.2; filter: blur(8px) brightness(1.1); }
            100% { opacity: 0.7; filter: blur(12px) brightness(1.6); }
        }

        /* Ambient Confetti Container */
        #confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }
        .ambient-confetti {
            position: absolute;
            pointer-events: none;
        }

        /* Slideshow Container */
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
        }

        .content {
            background: rgba(0, 0, 0, 0.85);
            padding: 100px 80px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--rose-red);
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
            max-width: 1550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 5;
        }

        /* Progress Bar */
        #progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(168, 28, 46, 0.05);
            z-index: 100;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--rose-red);
            box-shadow: 0 0 15px var(--cfg-glow);
            transition: width 0.1s linear;
        }



        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            letter-spacing: -2px;
            font-size: 120px;
            margin: 40px 0 0 0;
            color: var(--rose-red);
            line-height: 1.1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 40px var(--cfg-glow);
            white-space: normal;
            max-width: 1100px;
        }
        
        h2 {
            font-size: 52px;
            font-weight: 400;
            margin: 40px 0;
            color: rgba(255, 255, 255, 0.95);
            max-width: 1200px;
            text-wrap: balance;
            line-height: 1.4;
            text-transform: none;
            letter-spacing: 1px;
        }
        /* QR Code Styling */
        .qr-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .qr-frame {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--rose-red);
            transition: transform 0.3s ease;
        }

        .qr-frame:hover {
            transform: scale(1.05);
        }

        .qr-frame img {
            display: block;
            width: 250px;
            height: 250px;
            image-rendering: high-quality;
        }


        /* Progress Bar */
        #progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: rgba(0,0,0,0.3); z-index: 1000; }
        #progress-bar { width: 0%; height: 100%; background: var(--rose-red); box-shadow: 0 0 20px var(--rose-red); transition: width 0.05s linear; }

        /* Confetti Layer */
        #confetti-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 50; pointer-events: none; overflow: hidden; 
        }
        .ambient-confetti { position: absolute; z-index: 50; pointer-events: none; }

        /* Clock Styling */
        #clock {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 60px;
            font-weight: 800;
            color: var(--rose-red);
            text-shadow: 0 0 30px var(--cfg-glow);
            z-index: 100;
            font-family: 'Outfit', sans-serif;
            background: rgba(0,0,0,0.6);
            padding: 15px 35px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: clock-glow 4s infinite alternate;
        }

        @keyframes clock-glow {
            from { text-shadow: 0 0 20px var(--cfg-glow); border-color: rgba(255, 215, 0, 0.2); transform: scale(1); }
            to { text-shadow: 0 0 50px var(--cfg-glow); border-color: rgba(255, 215, 0, 0.6); transform: scale(1.02); }
        }




    </style>

</head>
<body>

    <div id="display-container">
        <div id="clock">00:00:00</div>
        <div class="quiz-bg"></div>
        <div class="quiz-bg-glow"></div>

        <div class="slideshow-container" id="slides-wrapper">
            <!-- Slides are injected here by init() -->
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="confetti-container"></div>
    </div>


    <script>
        // --- Security Helpers ---
        function sanitize(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
        }
        function safeUrl(url) {
            if (!url) return '';
            return String(url).trim();
        }

        // --- State ---
        let state = {
            slides: [],
            currentSlideIdx: 0,
            isPaused: false,
            disabledSlides: [],
            overrides: {}
        };

        // --- DOM Elements ---
        const slidesWrapper = document.getElementById('slides-wrapper');
        const progressBar = document.getElementById('progress-bar');

        function updateState(newState) {
            state = { ...state, ...newState };
            renderSlides();
        }

        function toggleSlidePlay() {
            state.isPaused = !state.isPaused;
            if (state.isPaused) {
                clearInterval(slideInterval);
                clearInterval(progressInterval);
            } else {
                startSlideTimer(30000); // Default resume
            }
        }

        // --- Slideshow Logic ---
        let slideInterval;
        let progressInterval;

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            slides[state.currentSlideIdx].classList.remove('active');
            state.currentSlideIdx = (state.currentSlideIdx + 1) % slides.length;
            
            // Re-check for updates at start of cycle
            if (state.currentSlideIdx === 0) {
                console.log('[QUIZ] Cycle complete.');
            }

            slides[state.currentSlideIdx].classList.add('active');
            
            const dur = parseInt(slides[state.currentSlideIdx].getAttribute('data-duration')) || 30000;
            startSlideTimer(dur);
            createConfettiBurst();
        }

        function prevSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            slides[state.currentSlideIdx].classList.remove('active');
            state.currentSlideIdx = (state.currentSlideIdx + slides.length - 1) % slides.length;
            slides[state.currentSlideIdx].classList.add('active');
            
            const dur = parseInt(slides[state.currentSlideIdx].getAttribute('data-duration')) || 8000;
            startSlideTimer(dur);
        }

        function startSlideTimer(duration) {
            clearInterval(slideInterval);
            clearInterval(progressInterval);
            
            let start = Date.now();
            progressBar.style.width = '0%';
            
            progressInterval = setInterval(() => {
                let elapsed = Date.now() - start;
                let percent = (elapsed / duration) * 100;
                progressBar.style.width = Math.min(percent, 100) + '%';
            }, 50);

            if (state.isPaused) return;

            slideInterval = setInterval(() => {
                if (state.isPaused) return;
                nextSlide();
            }, duration);
        }

        function renderSlides() {
            const visibleSlides = state.slides;
            if (visibleSlides.length === 0) {
                slidesWrapper.innerHTML = '';
                return;
            }

            slidesWrapper.innerHTML = visibleSlides.map((slide, i) => {
                const title = slide.title || '';
                const subtitle = slide.subtitle || '';
                const duration = slide.duration || 30000;
                const bgImg = safeUrl(slide.backgroundImage);
                const bgStyle = bgImg ? `background-image: url('${bgImg}');` : '';
                
                return `
                    <div class="slide ${i === state.currentSlideIdx ? 'active' : ''}" style="${bgStyle}" data-duration="${duration}">
                        <div class="content">
                            ${title ? `<h1>${sanitize(title).replace(/\n/g, '<br>')}</h1>` : ''}
                            ${subtitle ? `<h2>${sanitize(subtitle).replace(/\n/g, '<br>')}</h2>` : ''}
                            
                            <div class="qr-container" style="margin-top: 40px;">
                                <div class="qr-frame" style="padding: 30px; border-radius: 30px; border-width: 5px;">
                                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&ecc=L&data=${encodeURIComponent(slide.qrUrl || 'https://bookings.nowbookit.com/?accountid=d7034cd3-cfde-4556-a98c-ea943ec35ef4&venueid=13703&theme=light&colors=hex,000000&date=' + getNextWednesday() + '&serviceids=event')}" alt="QR Code" style="width: 350px; height: 350px;">
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const currentDur = visibleSlides[state.currentSlideIdx]?.duration || 30000;
            startSlideTimer(currentDur);
        }

        // --- Date Calculation ---
        function getNZDate() {
            const tz = 'Pacific/Auckland';
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: tz,
                year: 'numeric', month: 'numeric', day: 'numeric',
                hour: 'numeric', minute: 'numeric', second: 'numeric',
                hourCycle: 'h23'
            }).formatToParts(new Date());
            const v = {};
            parts.forEach(p => v[p.type] = p.value);
            return new Date(v.year, v.month - 1, v.day, v.hour, v.minute, v.second);
        }



        function getNextWednesday() {
            const d = getNZDate();
            let day = d.getDay();
            let daysUntilNextWed = (3 + 7 - day) % 7;
            if (daysUntilNextWed === 0 && d.getHours() >= 19) daysUntilNextWed = 7;
            d.setDate(d.getDate() + daysUntilNextWed);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // --- Static Content ---
        function loadStaticSlide() {
            const nextWed = getNextWednesday();
            updateState({ slides: [{ 
                title: "Quiz will be starting soon", 
                subtitle: "while you are waiting, please take the time to scan the qr code to book your team in for next weeks quiz",
                qrUrl: `https://bookings.nowbookit.com/?accountid=d7034cd3-cfde-4556-a98c-ea943ec35ef4&venueid=13703&theme=light&colors=hex,000000&date=${nextWed}&serviceids=event`,
                backgroundImage: "quiz.png",
                type: "qr"
            }] });
        }



        setInterval(() => {
            const now = getNZDate();
            const clockEl = document.getElementById('clock');
            if (clockEl) {
                clockEl.innerText = now.toLocaleTimeString('en-NZ', { hour12: false });
            }
        }, 1000);

        // --- Confetti Logic ---
        const confettiContainer = document.getElementById('confetti-container');
        const crowns = ['❓', '🤔', '💡', '🎓', 'LOGO'];

        function spawnAmbientConfetti() {
            const symbol = crowns[Math.floor(Math.random() * crowns.length)];
            const el = document.createElement('div');
            el.className = 'ambient-confetti';
            el.style.top = '-80px';
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = Math.random() * 1.2 + 1.8 + 'rem'; // 1.8 to 3.0rem
            el.style.filter = 'drop-shadow(0 4px 10px rgba(0,0,0,0.2))';
            el.style.opacity = Math.random() * 0.5 + 0.4; // More visible flow

            if (symbol === 'LOGO') {
                const img = document.createElement('img');
                img.src = 'coasters-logo.png';
                img.style.width = '2.5rem';
                img.style.height = 'auto';
                img.style.opacity = '0.7';
                el.appendChild(img);
            } else {
                el.innerText = symbol;
            }

            const duration = Math.random() * 5 + 7; // Unified duration range
            el.style.transition = `transform ${duration}s linear`;
            confettiContainer.appendChild(el);

            setTimeout(() => {
                el.style.transform = `translateY(120vh) rotate(${Math.random() * 720}deg)`;
            }, 50);

            setTimeout(() => el.remove(), duration * 1000 + 100);
        }

        function createConfettiBurst() {
            for (let i = 0; i < 40; i++) {
                const symbol = crowns[Math.floor(Math.random() * crowns.length)];
                const el = document.createElement('div');
                el.style.position = 'absolute';
                el.style.top = '-80px';
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = '2.5rem';
                el.style.filter = 'drop-shadow(0 5px 15px rgba(0,0,0,0.3))';
                el.style.zIndex = Math.random() > 0.5 ? 60 : 40;

                if (symbol === 'LOGO') {
                    const img = document.createElement('img');
                    img.src = 'coasters-logo.png';
                    img.style.width = '3.5rem';
                    img.style.height = 'auto';
                    el.appendChild(img);
                } else {
                    el.innerText = symbol;
                }

                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                el.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-in`;
                confettiContainer.appendChild(el);

                setTimeout(() => {
                    el.style.transform = `translateY(120vh) rotate(${Math.random() * 360}deg)`;
                    el.style.opacity = '0';
                }, delay * 1000 + 50);

                setTimeout(() => el.remove(), (duration + delay) * 1000 + 100);
            }
        }

        // Start ambient confetti loop
        setInterval(spawnAmbientConfetti, 500);

        // --- Init ---
        async function init() {
            const cfg = window.QUIZ_CONFIG;
            if (cfg) {
                const root = document.documentElement;
                if (cfg.COLORS.primary) root.style.setProperty('--cfg-primary', cfg.COLORS.primary);
                if (cfg.COLORS.softPink) root.style.setProperty('--cfg-soft-pink', cfg.COLORS.softPink);
                if (cfg.COLORS.cream) root.style.setProperty('--cfg-cream', cfg.COLORS.cream);
                if (cfg.COLORS.textDark) root.style.setProperty('--cfg-text-dark', cfg.COLORS.textDark);
                if (cfg.COLORS.glow) root.style.setProperty('--cfg-glow', cfg.COLORS.glow);
            }

            function resize() {
                const container = document.getElementById('display-container');
                const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
                container.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
            window.addEventListener('resize', resize);
            resize();

            loadStaticSlide();
        }

        init();
    </script>
</body>
</html>
